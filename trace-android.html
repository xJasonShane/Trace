<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>拾光手账 · Android 体验版</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   设计令牌（取自 uni.scss / App.vue）
   ═══════════════════════════════════════════════════════════════ */
:root{
  --bg:#FAF8F5; --fg:#2D2A26; --surface:#FFFFFF; --surface-alt:#F5F2EE;
  --border:#EDEAE5; --border-light:#E0DCD7; --primary:#E09080;
  --text-secondary:#7A756F; --text-tertiary:#A5A09A;
  --shadow:rgba(0,0,0,.06); --shadow-strong:rgba(0,0,0,.10);
  --overlay:rgba(250,248,245,.96); --input-bg:rgba(45,42,38,.07);
  --accent:#7FA3C8; --accent-tertiary:#B8A0D0; --accent-success:#8FB888;
  --accent-warning:#DDB86A; --accent-rating:#D9A54A; --danger:#C8504A;
  --map-water:#B5CCE3; --map-park:#B8D5AE; --map-road:#E0DCD7;
  --map-building:#EDEAE5;
}
.theme-dark{
  --bg:#1A1816; --fg:#E8E4E0; --surface:#2A2724; --surface-alt:#322E2B;
  --border:#3A3734; --border-light:#44403C; --primary:#E09080;
  --text-secondary:#A5A09A; --text-tertiary:#6E6A65;
  --shadow:rgba(0,0,0,.3); --shadow-strong:rgba(0,0,0,.4);
  --overlay:rgba(26,24,22,.96); --input-bg:rgba(255,255,255,.08);
  --map-water:#2A3845; --map-park:#2E3A2C; --map-road:#33302C; --map-building:#2F2C29;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; height:100%;}
body{
  font-family:-apple-system,'SF Pro Text','PingFang SC','Helvetica Neue',sans-serif;
  background:linear-gradient(135deg,#E8DDD3 0%,#D9C9BC 100%);
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:24px 12px; color:#2D2A26;
}
.mono{font-family:ui-monospace,'SF Mono','Menlo',monospace;}

/* ═══════════════════════════════════════════════════════════════
   Android 设备外框
   ═══════════════════════════════════════════════════════════════ */
.device{
  position:relative; width:390px; height:844px; max-height:96vh;
  background:#1C1C1E; border-radius:48px; padding:12px;
  box-shadow:0 30px 80px rgba(0,0,0,.35), 0 0 0 2px #3a3a3c inset;
  flex-shrink:0;
}
.device::before{ /* 侧边按键 */
  content:''; position:absolute; left:-2px; top:150px; width:3px; height:60px;
  background:#1C1C1E; border-radius:2px 0 0 2px;
}
.device::after{
  content:''; position:absolute; right:-2px; top:130px; width:3px; height:90px;
  background:#1C1C1E; border-radius:0 2px 2px 0;
}
.screen{
  position:relative; width:100%; height:100%; background:var(--bg);
  border-radius:38px; overflow:hidden; transition:background .3s;
}
/* 前置摄像头开孔 */
.punch-hole{
  position:absolute; top:10px; left:50%; transform:translateX(-50%);
  width:11px; height:11px; background:#0A0A0C; border-radius:50%; z-index:200;
}

/* 状态栏 */
.statusbar{
  height:30px; display:flex; align-items:center; justify-content:space-between;
  padding:0 22px 0 24px; font-size:13px; font-weight:600; color:var(--fg);
  position:relative; z-index:50; flex-shrink:0;
}
.statusbar .sb-right{display:flex; align-items:center; gap:6px;}
.statusbar svg{display:block;}
.sb-batt{width:24px; height:12px; border:1.5px solid currentColor; border-radius:3px; position:relative; padding:1.5px;}
.sb-batt::after{content:''; position:absolute; right:-3px; top:3px; width:2px; height:4px; background:currentColor; border-radius:0 2px 2px 0;}
.sb-batt i{display:block; width:80%; height:100%; background:currentColor; border-radius:1px;}

/* ═══════════════════════════════════════════════════════════════
   App 容器
   ═══════════════════════════════════════════════════════════════ */
.app{display:flex; flex-direction:column; height:calc(100% - 30px); position:relative;}
.page{display:none; flex:1; flex-direction:column; min-height:0; position:relative; overflow:hidden;}
.page.active{display:flex;}

/* 滚动区 */
.scroll{flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{width:0;}

/* 通用标题 */
.page-title{font-size:22px; font-weight:600; color:var(--fg); letter-spacing:-.02em; margin:0 0 12px;}

/* ═══════════════════════════════════════════════════════════════
   底部 TabBar
   ═══════════════════════════════════════════════════════════════ */
.tabbar{
  display:flex; padding:6px 8px 0; padding-bottom:env(safe-area-inset-bottom);
  border-top:1px solid var(--border); background:var(--overlay);
  flex-shrink:0; z-index:60;
}
.tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:5px 0 3px; color:var(--text-tertiary); position:relative; cursor:pointer; border:none; background:none;}
.tab.active{color:var(--primary);}
.tab .tl{font-size:10px; font-weight:500; letter-spacing:.02em;}
.tab.active .tl{font-weight:600;}
.tab-dot{position:absolute; bottom:1px; left:50%; transform:translateX(-50%); width:4px; height:4px; background:var(--primary); border-radius:50%;}

/* ═══════════════════════════════════════════════════════════════
   地图页
   ═══════════════════════════════════════════════════════════════ */
.map-area{flex:1; position:relative; overflow:hidden; background:var(--map-building);}
.map-canvas{position:absolute; inset:0; width:100%; height:100%;}
.map-search{
  position:absolute; top:12px; left:16px; right:62px; z-index:3;
  display:flex; align-items:center; gap:8px; background:var(--surface);
  border:1px solid var(--border); border-radius:14px; padding:12px 16px;
  cursor:pointer; box-shadow:0 2px 12px var(--shadow);
}
.map-search .ms-text{font-size:14px; color:var(--text-tertiary);}
.map-locate{
  position:absolute; top:12px; right:16px; z-index:3; width:36px; height:36px;
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  background:var(--surface); border:1px solid var(--border); cursor:pointer;
  box-shadow:0 2px 12px var(--shadow);
}
.map-overlay{position:absolute; inset:0; z-index:4; background:rgba(0,0,0,.4); opacity:0; pointer-events:none; transition:opacity .3s;}
.map-overlay.show{opacity:1; pointer-events:auto;}
.map-card{
  position:absolute; left:0; right:0; bottom:0; z-index:5;
  background:var(--surface); border-radius:22px 22px 0 0; padding:8px 18px 28px;
  transform:translateY(110%); transition:transform .35s cubic-bezier(.32,.72,0,1);
  max-height:62%;
}
.map-card.show{transform:translateY(0);}
.mc-handle{display:flex; justify-content:center; padding:8px 0 12px;}
.mc-handle-bar{width:36px; height:4px; background:var(--border-light); border-radius:2px;}
.mc-cover{width:100%; height:140px; border-radius:14px; overflow:hidden; margin-bottom:14px; display:flex; align-items:center; justify-content:center;}
.mc-cover.ph-warm{background:linear-gradient(135deg,#EDCFC6,#D9AFA2);}
.mc-cover.ph-blue{background:linear-gradient(135deg,#BDD3E8,#9DBBD8);}
.mc-cover.ph-lavender{background:linear-gradient(135deg,#D2C5E2,#B5A8CE);}
.mc-cover.ph-green{background:linear-gradient(135deg,#C0D9B8,#9EC594);}
.mc-cover.ph-gold{background:linear-gradient(135deg,#E2D4B8,#CEBC98);}
.mc-title{font-size:17px; font-weight:700; line-height:22px; margin-bottom:4px; color:var(--fg);}
.mc-meta{font-size:12px; color:var(--text-secondary); margin-bottom:10px;}
.mc-rating{display:flex; align-items:center; margin-bottom:10px; gap:8px;}
.mc-score{font-size:20px; font-weight:700; color:var(--accent-rating);}
.mc-stars{font-size:14px; color:var(--accent-rating); letter-spacing:2px;}
.mc-excerpt{font-size:13px; line-height:19px; color:var(--text-secondary); margin-bottom:14px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;}
.mc-actions{display:flex; gap:10px;}
.mc-btn{flex:1; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:600; cursor:pointer; border:none;}
.mc-btn-primary{background:var(--primary); color:#fff;}
.mc-btn-outline{background:transparent; border:1.5px solid var(--primary); color:var(--primary);}

/* 地图标记 */
.marker{position:absolute; transform:translate(-50%,-100%); cursor:pointer; z-index:2; transition:transform .2s;}
.marker:hover{transform:translate(-50%,-100%) scale(1.1);}
.marker-pin{width:30px; height:30px; border-radius:50% 50% 50% 0; transform:rotate(-45deg); display:flex; align-items:center; justify-content:center; box-shadow:0 3px 8px rgba(0,0,0,.25); border:2px solid #fff;}
.marker-pin span{transform:rotate(45deg); font-size:12px;}
.marker-label{position:absolute; top:32px; left:50%; transform:translateX(-50%); white-space:nowrap; background:var(--surface); color:var(--fg); font-size:11px; font-weight:500; padding:3px 8px; border-radius:6px; box-shadow:0 2px 8px var(--shadow); border:1px solid var(--border);}

/* 地图指南提示 */
.map-tip{position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:3; background:rgba(0,0,0,.6); color:#fff; font-size:12px; padding:8px 16px; border-radius:20px; backdrop-filter:blur(8px); transition:opacity .4s;}

/* ═══════════════════════════════════════════════════════════════
   手账列表页
   ═══════════════════════════════════════════════════════════════ */
.list-header{padding:4px 16px 10px;}
.list-search{display:flex; align-items:center; gap:8px; background:var(--input-bg); border-radius:12px; padding:10px 14px; cursor:pointer;}
.list-search .ls-text{font-size:14px; color:var(--text-tertiary);}
.filter-bar{white-space:nowrap; padding:4px 16px 10px; overflow-x:auto;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-item{display:inline-flex; align-items:center; padding:6px 14px; margin-right:8px; border-radius:999px; border:1px solid var(--border-light); background:transparent; font-size:12px; color:var(--text-secondary); cursor:pointer;}
.filter-item.active{background:rgba(224,144,128,.15); border-color:transparent; color:var(--primary); font-weight:500;}
.list-body{padding:0 16px;}
.list-date-label{display:block; font-size:12px; font-weight:600; color:var(--text-secondary); margin:12px 0 8px; letter-spacing:.02em;}
.list-card{display:flex; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:12px; margin-bottom:12px; box-shadow:0 1px 8px var(--shadow); cursor:pointer; transition:transform .15s;}
.list-card:active{transform:scale(.98);}
.lc-thumb{width:60px; height:60px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; color:#fff; font-size:11px;}
.lc-thumb.ph-warm{background:linear-gradient(135deg,#EDCFC6,#D9AFA2);}
.lc-thumb.ph-blue{background:linear-gradient(135deg,#BDD3E8,#9DBBD8);}
.lc-thumb.ph-lavender{background:linear-gradient(135deg,#D2C5E2,#B5A8CE);}
.lc-thumb.ph-green{background:linear-gradient(135deg,#C0D9B8,#9EC594);}
.lc-thumb.ph-gold{background:linear-gradient(135deg,#E2D4B8,#CEBC98);}
.lc-body{flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; justify-content:center;}
.lc-title{font-size:15px; font-weight:600; color:var(--fg); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.lc-loc{font-size:12px; color:var(--text-secondary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.lc-date{font-size:11px; color:var(--text-tertiary); margin-top:2px;}
.lc-delete{width:34px; height:60px; display:flex; align-items:center; justify-content:center; flex-shrink:0; border-radius:10px; border:none; background:none; cursor:pointer;}
.lc-delete:active{background:rgba(200,80,74,.1);}
.fab{position:absolute; right:18px; bottom:24px; width:52px; height:52px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 20px rgba(224,144,128,.4); z-index:40; border:none; cursor:pointer;}

/* 空状态 */
.empty-state{display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 24px; text-align:center;}
.empty-icon{width:90px; height:90px; border-radius:50%; background:var(--input-bg); display:flex; align-items:center; justify-content:center; margin-bottom:18px;}
.empty-title{font-size:16px; font-weight:600; color:var(--fg); margin-bottom:6px;}
.empty-desc{font-size:13px; color:var(--text-secondary); margin-bottom:20px; line-height:1.5;}
.empty-btn{padding:10px 28px; background:var(--primary); color:#fff; border-radius:999px; font-size:14px; font-weight:500; border:none; cursor:pointer;}

/* ═══════════════════════════════════════════════════════════════
   统计页
   ═══════════════════════════════════════════════════════════════ */
.stats-header{padding:4px 16px 12px;}
.stats-summary{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 16px; margin-bottom:14px;}
.stats-card{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px; box-shadow:0 1px 8px var(--shadow); display:flex; flex-direction:column; gap:2px;}
.sc-val{font-size:26px; font-weight:700; color:var(--fg); line-height:1.1;}
.sc-lbl{font-size:12px; color:var(--text-secondary); margin-top:2px;}
.sc-trend{display:inline-flex; align-items:center; gap:2px; padding:2px 8px; border-radius:8px; font-size:11px; font-weight:600; margin-top:6px; align-self:flex-start;}
.sc-trend.up{color:#4A8E40; background:#E0F0DC;}
.chart-card{margin:0 16px 14px; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px; box-shadow:0 1px 8px var(--shadow);}
.chart-title{display:block; font-size:14px; font-weight:600; color:var(--fg); margin-bottom:14px;}
.chart-bars{display:flex; align-items:flex-end; gap:4px; height:130px;}
.bar-col{flex:1; display:flex; flex-direction:column; align-items:center; height:100%;}
.bar-wrap{flex:1; width:100%; display:flex; align-items:flex-end; justify-content:center;}
.bar{width:70%; background:rgba(127,163,200,.25); border-radius:4px; min-height:8px; transition:height .4s;}
.bar.active{background:var(--primary);}
.bar-label{font-size:9px; color:var(--text-tertiary); margin-top:5px;}
.mood-breakdown{padding:0 16px; margin-bottom:14px;}
.mood-title{display:block; font-size:14px; font-weight:600; color:var(--fg); margin-bottom:14px; position:relative; padding-left:12px;}
.mood-title::before{content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:4px; height:13px; background:var(--primary); border-radius:2px;}
.mood-bar-row{display:flex; align-items:center; gap:12px; margin-bottom:10px;}
.mood-emoji{font-size:18px; width:26px; text-align:center;}
.mood-track{flex:1; height:12px; background:var(--input-bg); border-radius:6px; overflow:hidden;}
.mood-fill{height:100%; border-radius:6px; transition:width .4s;}
.mood-pct{font-size:12px; font-weight:700; color:var(--text-secondary); width:40px; text-align:right;}

/* ═══════════════════════════════════════════════════════════════
   个人页
   ═══════════════════════════════════════════════════════════════ */
.profile-top{text-align:center; padding:16px 16px 20px;}
.profile-avatar{width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg,#EDCFC6,#D2C5E2); margin:0 auto 10px; display:flex; align-items:center; justify-content:center; overflow:hidden;}
.profile-name{display:block; font-size:18px; font-weight:600; color:var(--fg); margin-bottom:4px;}
.profile-bio{display:block; font-size:13px; color:var(--text-secondary);}
.profile-stats{display:flex; align-items:center; padding:0 16px; margin-bottom:20px;}
.ps{flex:1; text-align:center; display:flex; flex-direction:column; gap:2px; border-radius:8px; cursor:pointer; background:none; border:none;}
.ps-divider{width:1px; height:36px; background:var(--border);}
.pv{font-size:22px; font-weight:700; color:var(--fg);}
.pl{font-size:11px; color:var(--text-secondary);}
.settings-group{margin:0 16px 14px; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:0 14px; box-shadow:0 1px 8px var(--shadow);}
.settings-row{display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid var(--border); cursor:pointer;}
.settings-row:last-child{border-bottom:0;}
.settings-icon{width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.icon-edit{background:var(--primary);}
.icon-theme{background:var(--accent);}
.icon-notify{background:var(--accent-tertiary);}
.icon-backup{background:var(--accent-success);}
.icon-about{background:var(--accent-warning);}
.settings-label{flex:1; font-size:15px; font-weight:500; color:var(--fg);}
.settings-meta{font-size:13px; color:var(--text-tertiary); margin-right:4px;}
.toggle{width:46px; height:28px; background:var(--primary); border-radius:14px; position:relative; transition:background .2s; flex-shrink:0; cursor:pointer;}
.toggle::after{content:''; position:absolute; top:3px; right:3px; width:22px; height:22px; background:#fff; border-radius:50%; box-shadow:0 1px 4px rgba(0,0,0,.15); transition:all .2s;}
.toggle.off{background:var(--border-light);}
.toggle.off::after{right:auto; left:3px;}

/* ═══════════════════════════════════════════════════════════════
   详情/编辑/搜索页（二级页面，覆盖式）
   ═══════════════════════════════════════════════════════════════ */
.subpage{position:absolute; inset:0; z-index:80; background:var(--bg); display:none; flex-direction:column; transform:translateX(100%); transition:transform .3s cubic-bezier(.32,.72,0,1);}
.subpage.show{display:flex; transform:translateX(0);}

.nav-bar{display:flex; align-items:center; padding:8px 12px 8px; gap:8px; flex-shrink:0; border-bottom:1px solid var(--border);}
.nav-back{width:36px; height:36px; border-radius:10px; background:var(--input-bg); display:flex; align-items:center; justify-content:center; cursor:pointer; border:none;}
.nav-title{flex:1; text-align:center; font-size:16px; font-weight:600; color:var(--fg); letter-spacing:-.01em;}
.nav-spacer{width:36px;}

/* 详情页 hero */
.hero{background:linear-gradient(135deg,#EDCFC6 0%,#D9AFA2 100%); position:relative; overflow:hidden; flex-shrink:0;}
.hero-content{height:170px; position:relative; display:flex; align-items:center; justify-content:center;}
.hero-pattern{position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 20px,rgba(255,255,255,.1) 20px,rgba(255,255,255,.1) 21px),repeating-linear-gradient(90deg,transparent,transparent 20px,rgba(255,255,255,.05) 20px,rgba(255,255,255,.05) 21px); pointer-events:none;}
.hero-icon{opacity:.4; position:relative; z-index:1;}
.hero-nav{position:absolute; top:10px; left:12px; right:12px; display:flex; justify-content:space-between; z-index:2;}
.nav-btn{width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,.85); display:flex; align-items:center; justify-content:center; box-shadow:0 1px 6px rgba(0,0,0,.08); cursor:pointer; border:none;}

.detail-content{padding:16px; flex:1; overflow-y:auto;}
.detail-content::-webkit-scrollbar{width:0;}
.title-section{margin-bottom:12px;}
.d-title{font-size:20px; font-weight:600; color:var(--fg); letter-spacing:-.01em; margin-bottom:8px; line-height:1.3;}
.meta{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-secondary);}
.tags-row{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;}
.mood-pill{display:inline-flex; align-items:center; gap:5px; padding:5px 12px; background:rgba(224,144,128,.15); color:var(--primary); border-radius:999px; font-size:12px; font-weight:500;}
.tag-item{display:inline-flex; padding:5px 12px; background:transparent; color:var(--text-secondary); border:1px solid var(--border-light); border-radius:999px; font-size:12px; font-weight:500;}
.content-text{font-size:15px; line-height:1.7; color:var(--text-secondary); margin-bottom:16px; letter-spacing:.01em; white-space:pre-wrap;}
.photo-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px;}
.photo-item{height:120px; border-radius:12px; overflow:hidden; background:linear-gradient(135deg,#EDEAE5,#E0DCD7); display:flex; align-items:center; justify-content:center; cursor:pointer;}
.rating-card{background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:16px; display:flex; align-items:center; gap:16px; margin-bottom:12px; position:relative; overflow:hidden; box-shadow:0 1px 8px var(--shadow);}
.rating-card::before{content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(180deg,#D9A54A,#E09080);}
.rc-score{font-size:34px; font-weight:800; color:var(--accent-rating); line-height:1; letter-spacing:-.03em;}
.rc-body{display:flex; flex-direction:column; gap:6px;}
.rc-label{font-size:12px; color:var(--text-secondary); font-weight:500;}
.dim-ratings{background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:14px 16px; box-shadow:0 1px 8px var(--shadow);}
.dim-title{font-size:14px; font-weight:600; color:var(--fg); margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid var(--border);}
.dim-row{display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border);}
.dim-row:last-child{border-bottom:none; padding-bottom:0;}
.dim-label{font-size:14px; color:var(--fg); font-weight:500;}

/* 星级 */
.stars{display:inline-flex; gap:2px;}
.stars .s{font-size:14px; color:var(--border-light);}
.stars .s.on{color:var(--accent-rating);}
.stars.lg .s{font-size:24px; cursor:pointer;}
.stars.md .s{font-size:20px; cursor:pointer;}

/* 编辑表单 */
.form-content{padding:12px 16px 120px; flex:1; overflow-y:auto;}
.form-content::-webkit-scrollbar{width:0;}
.form-group{margin-bottom:18px;}
.form-label{font-size:13px; font-weight:600; color:var(--text-secondary); margin-bottom:8px; display:block;}
.form-input{width:100%; padding:12px 14px; min-height:44px; line-height:1.5; border:1px solid var(--border-light); border-radius:12px; font-size:14px; background:var(--surface); color:var(--fg);}
.form-input::placeholder{color:var(--text-tertiary);}
.form-textarea{width:100%; padding:12px 14px; border:1px solid var(--border-light); border-radius:12px; font-size:14px; background:var(--surface); color:var(--fg); min-height:120px; line-height:1.6; resize:none; font-family:inherit;}
.loc-actions{display:flex; gap:10px; margin-top:8px;}
.loc-action-btn{flex:1; display:flex; align-items:center; justify-content:center; gap:5px; padding:10px 0; background:var(--surface); border:1px solid var(--border-light); border-radius:12px; font-size:13px; color:var(--text-secondary); cursor:pointer;}
.date-picker{display:flex; align-items:center; justify-content:space-between; padding:12px 14px; min-height:44px; border:1px solid var(--border-light); border-radius:12px; background:var(--surface); cursor:pointer;}
.date-text{font-size:14px; color:var(--fg);}
.mood-select{display:flex; gap:10px; flex-wrap:wrap;}
.mood-opt{width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22px; background:var(--input-bg); cursor:pointer; border:2px solid transparent;}
.mood-opt.on{border-color:var(--primary); background:rgba(224,144,128,.15);}
.photo-upload{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
.photo-add{aspect-ratio:1; border:1.5px dashed var(--border-light); border-radius:12px; display:flex; align-items:center; justify-content:center; color:var(--text-tertiary); cursor:pointer; background:var(--surface);}
.photo-tile{aspect-ratio:1; border-radius:12px; background:linear-gradient(135deg,#EDCFC6,#D9AFA2); display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; position:relative; overflow:hidden;}
.photo-tile .rm{position:absolute; top:4px; right:4px; width:18px; height:18px; border-radius:50%; background:rgba(0,0,0,.4); color:#fff; border:none; font-size:12px; display:flex; align-items:center; justify-content:center; cursor:pointer;}
.tag-pill{display:inline-flex; align-items:center; gap:5px; padding:6px 12px; background:rgba(224,144,128,.15); color:var(--primary); border-radius:999px; font-size:12px; font-weight:500;}
.tag-close{font-size:14px; line-height:1; opacity:.7; cursor:pointer;}
.tag-add{display:inline-flex; align-items:center; padding:6px 12px; background:transparent; color:var(--text-secondary); border:1px solid var(--border-light); border-radius:999px; font-size:12px; font-weight:500; cursor:pointer;}
.save-section{position:absolute; bottom:0; left:0; right:0; padding:12px 16px; background:var(--overlay); box-shadow:0 -1px 10px rgba(0,0,0,.04);}
.save-btn{width:100%; height:48px; background:var(--primary); border-radius:14px; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 12px rgba(224,144,128,.3); border:none; cursor:pointer;}
.save-text{color:#fff; font-size:16px; font-weight:600;}

/* 搜索页 */
.search-input-wrap{flex:1; display:flex; align-items:center; gap:8px; background:var(--surface); border:1.5px solid var(--primary); border-radius:12px; padding:8px 12px; box-shadow:0 1px 8px rgba(224,144,128,.12);}
.search-input{flex:1; font-size:14px; color:var(--fg); background:transparent; border:none; outline:none; min-width:0;}
.search-input::placeholder{color:var(--text-tertiary);}
.clear-btn{width:20px; height:20px; display:flex; align-items:center; justify-content:center; border-radius:50%; background:rgba(165,160,154,.25); border:none; color:#fff; cursor:pointer; font-size:14px; line-height:1;}
.search-results{padding:0 16px; flex:1; overflow-y:auto;}
.search-results::-webkit-scrollbar{width:0;}
.search-count{font-size:12px; color:var(--text-secondary); margin-bottom:10px; padding:2px 0;}
.list-card.search .lc-type-badge{position:absolute; top:10px; right:10px; padding:2px 8px; border-radius:999px; font-size:10px; font-weight:500;}
.badge-journal{background:rgba(224,144,128,.15); color:var(--primary);}
.badge-location{background:rgba(127,163,200,.15); color:var(--accent);}
.hl{background:rgba(221,184,106,.3); border-radius:3px;}

/* 地点详情 */
.loc-stats-card{display:flex; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px 0; margin:14px 16px 0; box-shadow:0 1px 8px var(--shadow);}
.loc-stat{flex:1; text-align:center;}
.loc-stat + .loc-stat{border-left:1px solid var(--border);}
.loc-stat-val{font-size:22px; font-weight:800; color:var(--primary); letter-spacing:-.02em; display:block;}
.loc-stat-lbl{font-size:11px; color:var(--text-secondary); margin-top:4px; font-weight:500;}
.info-section{padding:14px 16px 0;}
.info-title{font-size:20px; font-weight:600; color:var(--fg); letter-spacing:-.02em; margin-bottom:4px;}
.info-sub{font-size:13px; color:var(--text-secondary); margin-bottom:10px;}
.rating-row{display:flex; align-items:center; gap:8px; margin-bottom:4px;}
.rating-score{font-size:18px; font-weight:700; color:var(--accent-rating);}
.section-label{font-size:16px; font-weight:600; color:var(--fg); margin-bottom:12px; padding-left:6px; display:flex; align-items:center; gap:8px;}
.section-label::before{content:''; width:4px; height:16px; background:var(--primary); border-radius:2px;}
.journal-list{padding:16px;}
.journal-item{display:flex; gap:12px; align-items:flex-start; padding:12px 0; border-bottom:1px solid var(--border); cursor:pointer;}
.journal-item:last-child{border-bottom:none;}
.ji-thumb{width:54px; height:54px; border-radius:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center; overflow:hidden;}
.ji-body{flex:1; min-width:0; display:flex; flex-direction:column;}
.ji-title{font-size:14px; font-weight:600; color:var(--fg); margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.ji-excerpt{font-size:12px; color:var(--text-secondary); overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; line-height:1.5;}
.ji-date{font-size:11px; color:var(--text-tertiary); margin-top:4px;}

/* Toast */
.toast{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(.9); background:rgba(0,0,0,.78); color:#fff; padding:14px 22px; border-radius:14px; font-size:14px; z-index:300; opacity:0; pointer-events:none; transition:all .25s; max-width:80%; text-align:center;}
.toast.show{opacity:1; transform:translate(-50%,-50%) scale(1);}
.toast .ti{display:block; font-size:24px; margin-bottom:4px;}

/* Modal */
.modal-mask{position:absolute; inset:0; background:rgba(0,0,0,.45); z-index:250; display:none; align-items:center; justify-content:center; opacity:0; transition:opacity .2s;}
.modal-mask.show{display:flex; opacity:1;}
.modal{background:var(--surface); border-radius:18px; padding:24px; width:80%; max-width:300px; text-align:center;}
.modal-title{font-size:17px; font-weight:600; color:var(--fg); margin-bottom:10px;}
.modal-msg{font-size:14px; color:var(--text-secondary); line-height:1.5; margin-bottom:20px;}
.modal-actions{display:flex; gap:10px;}
.modal-btn{flex:1; height:42px; border-radius:12px; font-size:14px; font-weight:600; border:none; cursor:pointer;}
.modal-cancel{background:var(--surface-alt); color:var(--fg);}
.modal-confirm{background:var(--danger); color:#fff;}

/* ActionSheet */
.sheet-mask{position:absolute; inset:0; background:rgba(0,0,0,.45); z-index:240; display:none; align-items:flex-end; opacity:0; transition:opacity .2s;}
.sheet-mask.show{display:flex; opacity:1;}
.sheet{background:var(--surface); border-radius:18px 18px 0 0; padding:8px; width:100%; transform:translateY(100%); transition:transform .25s;}
.sheet-mask.show .sheet{transform:translateY(0);}
.sheet-item{padding:16px; text-align:center; font-size:16px; color:var(--fg); cursor:pointer; border-radius:12px;}
.sheet-item:active{background:var(--input-bg);}
.sheet-cancel{margin-top:8px; font-weight:600;}

/* 首次引导提示 */
.intro-badge{position:absolute; top:46px; left:50%; transform:translateX(-50%); z-index:70; background:var(--surface); border:1px solid var(--border); border-radius:999px; padding:6px 14px; font-size:11px; color:var(--text-secondary); box-shadow:0 2px 12px var(--shadow); display:flex; align-items:center; gap:6px;}

button{font-family:inherit;}

@media (max-height:880px){
  .device{height:96vh;}
}
</style>
</head>
<body>
<div class="device">
  <div class="screen" id="screen">
    <div class="punch-hole"></div>

    <!-- 状态栏 -->
    <div class="statusbar" id="statusbar">
      <span id="clock">9:41</span>
      <span class="sb-right">
        <!-- 信号 -->
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
        <!-- wifi -->
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 4a10 10 0 0114 0"/><path d="M3.5 6.5a6 6 0 019 0"/><circle cx="8" cy="10" r="1" fill="currentColor"/></svg>
        <span class="sb-batt"><i></i></span>
      </span>
    </div>

    <!-- App -->
    <div class="app">

      <!-- ═══ 页面：地图 ═══ -->
      <section class="page active" id="page-map">
        <div class="map-area">
          <canvas class="map-canvas" id="mapCanvas"></canvas>

          <div class="intro-badge" id="introBadge">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#E09080" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            点击地图标记查看手账，点空白处新建
          </div>

          <div class="map-search" onclick="navigate('search')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#A5A09A" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span class="ms-text">搜索地点或回忆…</span>
          </div>
          <div class="map-locate" onclick="locateCurrent()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7A756F" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
          </div>

          <div class="map-overlay" id="mapOverlay" onclick="dismissCard()"></div>

          <div class="map-card" id="mapCard">
            <div class="mc-handle"><div class="mc-handle-bar"></div></div>
            <div class="mc-cover" id="mcCover">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20l5.5-9 4 6 3-4.5 5.5 7.5z"/><circle cx="17" cy="7" r="2.5"/></svg>
            </div>
            <div class="mc-title" id="mcTitle"></div>
            <div class="mc-meta" id="mcMeta"></div>
            <div class="mc-rating">
              <span class="mc-score" id="mcScore"></span>
              <span class="mc-stars" id="mcStars"></span>
            </div>
            <div class="mc-excerpt" id="mcExcerpt"></div>
            <div class="mc-actions">
              <button class="mc-btn mc-btn-primary" onclick="goLocationDetail()">查看全部手账</button>
              <button class="mc-btn mc-btn-outline" onclick="goNewJournal()">写新手账</button>
            </div>
          </div>
        </div>
        <div id="tabbar-map"></div>
      </section>

      <!-- ═══ 页面：手账列表 ═══ -->
      <section class="page" id="page-journal">
        <div class="scroll">
          <div class="list-header">
            <div class="page-title">我的手账</div>
            <div class="list-search" onclick="navigate('search')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#A5A09A" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <span class="ls-text">搜索手账…</span>
            </div>
          </div>
          <div class="filter-bar" id="journalFilters"></div>
          <div class="list-body" id="journalList"></div>
          <div style="height:90px"></div>
        </div>
        <button class="fab" onclick="openJournalEdit()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <div id="tabbar-journal"></div>
      </section>

      <!-- ═══ 页面：统计 ═══ -->
      <section class="page" id="page-stats">
        <div class="scroll">
          <div class="stats-header"><div class="page-title">统计</div></div>
          <div class="stats-summary" id="statsSummary"></div>
          <div class="chart-card">
            <span class="chart-title">月度手账趋势</span>
            <div class="chart-bars" id="chartBars"></div>
          </div>
          <div class="mood-breakdown">
            <span class="mood-title">心情分布</span>
            <div id="moodBreakdown"></div>
          </div>
          <div style="height:90px"></div>
        </div>
        <div id="tabbar-stats"></div>
      </section>

      <!-- ═══ 页面：我的 ═══ -->
      <section class="page" id="page-profile">
        <div class="scroll">
          <div class="profile-top">
            <div class="profile-avatar" id="profileAvatar">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#C09080" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>
            </div>
            <span class="profile-name" id="profileName">小鹿同学</span>
            <span class="profile-bio" id="profileBio">用脚步丈量世界，用手账记录时光</span>
          </div>
          <div class="profile-stats">
            <button class="ps" onclick="switchTab(1)"><span class="pv" id="psJournals">0</span><span class="pl">手账</span></button>
            <div class="ps-divider"></div>
            <button class="ps" onclick="navigate('search', {filter:'location'})"><span class="pv" id="psLocations">0</span><span class="pl">地点</span></button>
            <div class="ps-divider"></div>
            <button class="ps" onclick="switchTab(1);setJournalFilter('photos')"><span class="pv" id="psPhotos">0</span><span class="pl">照片</span></button>
          </div>
          <div class="settings-group">
            <div class="settings-row" onclick="openProfileEdit()">
              <div class="settings-icon icon-edit"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
              <span class="settings-label">编辑资料</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#A5A09A" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
            <div class="settings-row" onclick="toggleTheme()">
              <div class="settings-icon icon-theme"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/></svg></div>
              <span class="settings-label">主题外观</span>
              <span class="settings-meta" id="themeMeta">白天模式</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#A5A09A" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
            <div class="settings-row" onclick="toggleNotify(event)">
              <div class="settings-icon icon-notify"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg></div>
              <span class="settings-label">通知提醒</span>
              <div class="toggle" id="notifyToggle"></div>
            </div>
          </div>
          <div class="settings-group">
            <div class="settings-row" onclick="doBackup()">
              <div class="settings-icon icon-backup"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
              <span class="settings-label">数据备份</span>
              <span class="settings-meta" id="backupMeta">未备份</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#A5A09A" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
            <div class="settings-row" onclick="showAbout()">
              <div class="settings-icon icon-about"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></div>
              <span class="settings-label">关于拾光</span>
              <span class="settings-meta">v0.0.1</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#A5A09A" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>

          <div style="height:90px"></div>
        </div>

      <!-- 二级页面：手账详情 -->
      <section class="subpage" id="sub-journal-detail">
        <div class="hero">
          <div class="hero-content">
            <div class="hero-pattern"></div>
            <div class="hero-icon"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#C09080" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20l5.5-9 4 6 3-4.5 5.5 7.5z"/><circle cx="17" cy="7" r="2.5"/></svg></div>
            <div class="hero-nav">
              <button class="nav-btn" onclick="closeSub('sub-journal-detail')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
              <button class="nav-btn" onclick="editCurrentJournal()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            </div>
          </div>
        </div>
        <div class="detail-content" id="journalDetailContent"></div>
      </section>

      <!-- 二级页面：手账编辑 -->
      <section class="subpage" id="sub-journal-edit">
        <div class="nav-bar">
          <button class="nav-back" onclick="closeSub('sub-journal-edit')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>

          <span class="nav-spacer"></span>
        </div>
        <div class="form-content">
          <div class="form-group">
            <label class="form-label">标题</label>
            <input class="form-input" id="f-title" placeholder="给这篇手账起个名字…" maxlength="50" />

          <div class="form-group">
            <label class="form-label">地点</label>
            <input class="form-input" id="f-loc" placeholder="输入地点名…" maxlength="30" />

/* ═══════════════════════════════════════════════════════════════
   工具函数
   ═══════════════════════════════════════════════════════════════ */
function formatDate(date){
  const d = new Date(date); const y=d.getFullYear();
  return `${y}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function formatRelative(date){
  const d=new Date(date), now=new Date(); const diff=now-d;
  const min=Math.floor(diff/60000), hr=Math.floor(diff/3600000), days=Math.floor(diff/86400000);
  if(min<1) return '刚刚';
  if(min<60) return `${min}分钟前`;
  if(hr<24) return `${hr}小时前`;
  if(days===1) return '昨天';
  if(days<7) return `${days}天前`;
  if(days<30) return `${Math.floor(days/7)}周前`;
  return formatDate(d);
}
function getDateGroup(date){
  const d=new Date(date), now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const target=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=Math.floor((today-target)/86400000);
  if(diff===0) return '今天';
  if(diff===1) return '昨天';
  if(diff<7) return '本周';
  if(diff<14) return '上周';
  if(diff<30) return '本月';
  return '更早';
}
function calcOverall(r){ const v=Object.values(r); return Math.round((v.reduce((a,b)=>a+b,0)/v.length)*10)/10; }
function genId(prefix){ return prefix+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

/* store 操作 */
function getJournal(id){ return state.journals.find(j=>j.id===id); }
function getLocation(id){ return state.locations.find(l=>l.id===id); }

function sortedJournals(){ return [...state.journals].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)); }
function searchJournals(kw){
  kw=kw.toLowerCase().trim(); if(!kw) return [];
  return sortedJournals().filter(j=>j.title.toLowerCase().includes(kw)||j.content.toLowerCase().includes(kw)||j.locationName.toLowerCase().includes(kw)||(j.tags&&j.tags.some(t=>t.toLowerCase().includes(kw))));
}
function searchLocations(kw){
  kw=kw.toLowerCase().trim(); if(!kw) return [];
  return state.locations.filter(l=>l.name.toLowerCase().includes(kw)||(l.address&&l.address.toLowerCase().includes(kw)));
}

/* ═══════════════════════════════════════════════════════════════

   ═══════════════════════════════════════════════════════════════ */
function $(id){ return document.getElementById(id); }
function el(tag, cls, html){
  const e=document.createElement(tag); if(cls) e.className=cls; if(html!=null) e.innerHTML=html; return e;
}

let toastTimer;
function showToast(title, icon){
  const t=$('toast');
  t.innerHTML = icon ? `<span class="ti">${icon}</span>${title}` : title;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'), 1600);
}

function showModal(title, msg, opts={}){
  return new Promise(resolve=>{
    $('modalTitle').textContent=title;
    $('modalMsg').textContent=msg;
    const cancel=$('modalCancel'), confirm=$('modalConfirm');
    cancel.style.display=opts.hideCancel?'none':'';
    confirm.textContent=opts.confirmText||'确定';
    confirm.style.background = opts.danger ? 'var(--danger)' : (opts.primary? 'var(--primary)':'var(--danger)');
    $('modalMask').classList.add('show');
    const cleanup=()=>{ $('modalMask').classList.remove('show'); cancel.onclick=null; confirm.onclick=null; };
    cancel.onclick=()=>{cleanup(); resolve(false);};
    confirm.onclick=()=>{cleanup(); resolve(true);};
  });
}

function showSheet(items){
  return new Promise(resolve=>{
    const body=$('sheetBody');
    body.innerHTML='';
    items.forEach((it,i)=>{
      const d=el('div', it.cancel?'sheet-item sheet-cancel':'sheet-item', it.label);
      d.onclick=()=>{ $('sheetMask').classList.remove('show'); resolve(i); };
      body.appendChild(d);
    });
    $('sheetMask').classList.add('show');
    // 点击遮罩取消
    $('sheetMask').onclick=(e)=>{ if(e.target===$('sheetMask')){ $('sheetMask').classList.remove('show'); resolve(-1);} };
  });
}

function starsHTML(rating, size='sm'){
  const full=Math.round(rating); let h='';
  for(let i=1;i<=5;i++) h+=`<span class="s ${i<=full?'on':''}">★</span>`;
  return `<span class="stars ${size}">${h}</span>`;
}

function renderTabBar(containerId, active){

let mapCtx, mapCanvas, mapMarkerEls=[];
function renderMap(){

  setTimeout(()=>{ const b=$('introBadge'); if(b) b.style.opacity='0'; }, 5000);

function drawMapCanvas(){
  mapCanvas=$('mapCanvas');
  const rect=mapCanvas.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  mapCanvas.width=rect.width*dpr; mapCanvas.height=rect.height*dpr;
  mapCtx=mapCanvas.getContext('2d'); mapCtx.scale(dpr,dpr);
  const W=rect.width, H=rect.height;
  const cs=getComputedStyle($('screen'));
  const water=cs.getPropertyValue('--map-water').trim();
  const park=cs.getPropertyValue('--map-park').trim();
  const road=cs.getPropertyValue('--map-road').trim();
  const building=cs.getPropertyValue('--map-building').trim();
  // 背景
  mapCtx.fillStyle=building; mapCtx.fillRect(0,0,W,H);
  // 水域 (西湖)
  mapCtx.fillStyle=water;
  mapCtx.beginPath();
  mapCtx.ellipse(W*0.38, H*0.52, W*0.16, H*0.12, 0.3, 0, Math.PI*2);
  mapCtx.fill();
  // 公园块
  mapCtx.fillStyle=park;
  mapCtx.fillRect(W*0.05, H*0.18, W*0.2, H*0.12);
  mapCtx.fillRect(W*0.72, H*0.65, W*0.22, H*0.18);
  mapCtx.beginPath(); mapCtx.arc(W*0.85, H*0.25, W*0.08, 0, Math.PI*2); mapCtx.fill();
  // 道路
  mapCtx.strokeStyle=road; mapCtx.lineWidth=10; mapCtx.lineCap='round';
  mapCtx.beginPath(); mapCtx.moveTo(0,H*0.4); mapCtx.lineTo(W,H*0.4); mapCtx.stroke();
  mapCtx.beginPath(); mapCtx.moveTo(0,H*0.75); mapCtx.lineTo(W,H*0.75); mapCtx.stroke();
  mapCtx.beginPath(); mapCtx.moveTo(W*0.5,0); mapCtx.lineTo(W*0.5,H); mapCtx.stroke();
  mapCtx.lineWidth=5;
  mapCtx.beginPath(); mapCtx.moveTo(0,H*0.1); mapCtx.bezierCurveTo(W*0.3,H*0.2,W*0.6,H*0.6,W,H*0.55); mapCtx.stroke();
  // 小建筑块
  mapCtx.fillStyle=building;
  for(let i=0;i<14;i++){
    const x=Math.random()*W, y=Math.random()*H, w=10+Math.random()*20, h=10+Math.random()*20;
    mapCtx.globalAlpha=0.6; mapCtx.fillRect(x,y,w,h);
  }
  mapCtx.globalAlpha=1;
}

function renderMapMarkers(){
  const area=document.querySelector('#page-map .map-area');
  mapMarkerEls.forEach(m=>m.remove()); mapMarkerEls=[];
  const rect=area.getBoundingClientRect();
  // 把经纬度映射到画布（演示用，固定中心+缩放）
  const center={lat:30.245, lng:120.14};
  const scale=4000; // 像素/度
  const colors={'warm':'#E09080','blue':'#7FA3C8','lavender':'#B8A0D0','green':'#8FB888','gold':'#DDB86A'};
  state.locations.forEach(loc=>{
    const x = rect.width/2 + (loc.longitude-center.lng)*scale/2;
    const y = rect.height/2 - (loc.latitude-center.lat)*scale/2;
    if(x<20||x>rect.width-20||y<40||y>rect.height-20) return;
    const m=el('div','marker');
    m.style.left=x+'px'; m.style.top=y+'px';
    m.innerHTML=`<div class="marker-pin" style="background:${colors[loc.coverColor]||'#E09080'}"><span>${loc.journalCount||''}</span></div><div class="marker-label">${loc.name}</div>`;
    m.onclick=(e)=>{ e.stopPropagation(); onMarkerTap(loc); };

function renderStats(){
  renderTabBar('tabbar-stats', 2);
  // 汇总
  const total=state.journals.length;
  const locCount=state.locations.length;
  const photoCount=state.journals.reduce((s,j)=>s+(j.photos?j.photos.length:0),0);
  const consec=consecutiveDays();
  const monthCount=thisMonthCount();
  const sc=$('statsSummary'); sc.innerHTML='';
  sc.appendChild(statCard(total,'总手账数',`↑ ${monthCount} 本月`,'up'));
  sc.appendChild(statCard(locCount,'到访地点','↑ 持续探索','up'));
  sc.appendChild(statCard(photoCount,'照片总数','↑ 美好瞬间','up'));
  sc.appendChild(statCard(consec,'连续天数',`最长 ${consec} 天`,'down'));
  // 月度趋势
  const trend=monthlyTrend();
  const max=Math.max(...trend.map(t=>t.count),1);
  const cb=$('chartBars'); cb.innerHTML='';
  trend.forEach((t,idx)=>{
    const col=el('div','bar-col');
    const h = t.count===0?8:Math.max(8,Math.round((t.count/max)*110));
    col.innerHTML=`<div class="bar-wrap"><div class="bar ${idx===trend.length-1?'active':''}" style="height:${h}px"></div></div><span class="bar-label">${t.month}月</span>`;
    cb.appendChild(col);
  });
  // 心情分布
  const dist=moodDistribution();
  const map={}; dist.forEach(d=>map[d.mood]=d);
  const mb=$('moodBreakdown'); mb.innerHTML='';
  MOODS.forEach(m=>{
    const d=map[m.emoji]; const pct=d?d.percentage:0;
    const row=el('div','mood-bar-row');
    row.innerHTML=`<span class="mood-emoji">${m.emoji}</span><div class="mood-track"><div class="mood-fill" style="width:${pct}%;background:${m.color}"></div></div><span class="mood-pct">${pct}%</span>`;
    mb.appendChild(row);
  });
}
function statCard(val,lbl,trend,dir){
  const c=el('div','stats-card');
  c.innerHTML=`<span class="sc-val mono">${val}</span><span class="sc-lbl">${lbl}</span><span class="sc-trend ${dir}">${trend}</span>`;
  return c;
}
function consecutiveDays(){
  if(state.journals.length===0) return 0;
  const dates=[...new Set(state.journals.map(j=>j.createdAt.slice(0,10)))].sort().reverse();
  let max=1,cur=1;
  for(let i=1;i<dates.length;i++){
    const prev=new Date(dates[i-1]), curr=new Date(dates[i]);
    if(Math.floor((prev-curr)/86400000)===1){ cur++; max=Math.max(max,cur); } else cur=1;
  }
  return max;
}
function thisMonthCount(){
  const now=new Date();
  return state.journals.filter(j=>{const d=new Date(j.createdAt); return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();}).length;
}
function monthlyTrend(){
  const now=new Date(), trend=[];
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const count=state.journals.filter(j=>{const jd=new Date(j.createdAt); return jd.getFullYear()===d.getFullYear()&&jd.getMonth()===d.getMonth();}).length;
    trend.push({month:d.getMonth()+1,count});
  }
  return trend;
}
function moodDistribution(){
  const dist={};
  state.journals.forEach(j=>{ if(j.mood) dist[j.mood]=(dist[j.mood]||0)+1; });
  const total=state.journals.length; const res=[];
  for(const [mood,count] of Object.entries(dist)) res.push({mood,count,percentage:total>0?Math.round(count/total*100):0});
  return res.sort((a,b)=>b.count-a.count);
}

    row.innerHTML=`<span class="dim-label">${d.label}</span><span class="stars md">${stars}</span>`;
    row.querySelectorAll('.s').forEach(s=>{
      s.onclick=()=>{ editForm.ratings[d.key]=+s.dataset.val; renderEditRatings(); };
    });
    c.appendChild(row);
  });
}
function renderEditTags(){
  const c=$('editTags'); c.innerHTML='';
  editForm.tags.forEach((t,i)=>{
    const p=el('span','tag-pill',`<span class="tag-text">${escapeHTML(t)}</span><span class="tag-close">×</span>`);
    p.onclick=()=>{ editForm.tags.splice(i,1); renderEditTags(); };
    c.appendChild(p);
  });
  const add=el('span','tag-add','+ 添加');
  add.onclick=async()=>{
    if(editForm.tags.length>=10){ showToast('最多添加10个标签'); return; }
    const presets=['春天','夏天','秋天','冬天','美食','散步','摄影','徒步','寺庙','花','夜晚','老街','自然','城市','海边','山'];
    const idx=await showSheet(presets.map(p=>({label:p})));
    if(idx>=0){ const t=presets[idx]; if(!editForm.tags.includes(t)){ editForm.tags.push(t); renderEditTags(); } }
  };
  c.appendChild(add);
}
function renderPhotoUpload(){
  const c=$('photoUpload'); c.innerHTML='';
  editForm.photos.forEach((p,i)=>{
    const t=el('div','photo-tile');
    t.innerHTML=`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><button class="rm">×</button>`;
    t.querySelector('.rm').onclick=(e)=>{ e.stopPropagation(); editForm.photos.splice(i,1); renderPhotoUpload(); };
    c.appendChild(t);
  });
  if(editForm.photos.length<9){
    const add=el('div','photo-add');
    add.innerHTML=`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
    add.onclick=()=>{ editForm.photos.push('placeholder'); showToast('已添加照片','✓'); renderPhotoUpload(); };
    c.appendChild(add);
  }
}
function pickMapLocation(){
  // 演示：从已有地点中选
  showSheet(state.locations.map(l=>({label:l.name}))).then(idx=>{
    if(idx>=0){ const loc=state.locations[idx]; editForm.locationName=loc.name; editForm.locationId=loc.id; $('f-loc').value=loc.name; }
  });
}
function useCurrentLocation(){ showToast('已定位到当前位置'); if(!editForm.locationName){ editForm.locationName='我的位置'; $('f-loc').value='我的位置'; } }
function pickDate(){
  showSheet(['今天','昨天','前天','3天前','一周前'].map(l=>({label:l}))).then(idx=>{
    if(idx>=0){ const d=new Date(); d.setDate(d.getDate()-idx); const s=d.toISOString().slice(0,10); editForm.date=s; $('f-date').textContent=s; }
  });
}
function saveJournal(){
  editForm.title=$('f-title').value.trim();
  editForm.locationName=$('f-loc').value.trim();
  editForm.content=$('f-content').value.trim();
  if(!editForm.title){ showToast('请输入标题'); return; }
  if(!editForm.content){ showToast('请输入内容'); return; }
  // 处理地点
  let locationId=editForm.locationId;
  if(editForm.locationName && !locationId){
    let loc=state.locations.find(l=>l.name===editForm.locationName);
    if(!loc){
      loc={id:genId('loc'), name:editForm.locationName, address:'', latitude:30.25+Math.random()*0.02, longitude:120.13+Math.random()*0.02, coverColor:COVER_COLORS[Math.floor(Math.random()*5)], visitCount:1, lastVisitDate:editForm.date, journalCount:0, photoCount:0, createdAt:new Date().toISOString()};
      state.locations.push(loc);
    }
    locationId=loc.id;
  } else if(editForm.locationName && locationId){
    const loc=getLocation(locationId);
    if(loc && !loc.address){ loc.name=editForm.locationName; }
  }
  const now=new Date();
  const timeStr=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const createdAt=editForm.date+' '+timeStr;
  const overall=calcOverall(editForm.ratings);
  const data={
    title:editForm.title, locationId, locationName:editForm.locationName,
    content:editForm.content, photos:editForm.photos, mood:editForm.mood,
    createdAt, ratings:{...editForm.ratings}, overallRating:overall, tags:[...editForm.tags]
  };
  if(editForm.isEdit){
    const j=getJournal(editForm.id);
    Object.assign(j, data, {updatedAt:new Date().toISOString()});
  } else {
    state.journals.unshift({id:genId('jour'), ...data, updatedAt:new Date().toISOString()});
  }
  if(locationId) updateLocStats(locationId);
  saveState();
  closeSub('sub-journal-edit');
  // 刷新当前页
  if(currentTab===0) renderMap();
  if(currentTab===1) renderJournalList();
  if(currentTab===2) renderStats();
  if(currentTab===3) renderProfile();
  showToast('保存成功','✓');
}

/* ═══════════════════════════════════════════════════════════════
   地点详情
   ═══════════════════════════════════════════════════════════════ */
let currentLocId='';
function openLocationDetail(id){
  const loc=getLocation(id); if(!loc) return;
  currentLocId=id;
  const journals=getJournalsByLocation(id);
  const sum=journals.reduce((s,j)=>s+(j.overallRating||0),0);
  const avg=journals.length?Math.round(sum/journals.length*10)/10:0;
  const photoCount=journals.reduce((s,j)=>s+(j.photos?j.photos.length:0),0);
  const c=$('locationDetailContent'); c.innerHTML='';
  c.innerHTML=`
    <div class="info-section">
      <div class="info-title">${escapeHTML(loc.name)}</div>
      <div class="info-sub">${escapeHTML(loc.address||'暂无地址')} · 最近到访 ${loc.lastVisitDate?formatDate(loc.lastVisitDate):'暂无'}</div>
      <div class="rating-row"><span class="rating-score mono">${avg||'暂无'}</span>${starsHTML(avg,'sm')}</div>
    </div>
    <div class="loc-stats-card">
      <div class="loc-stat"><span class="loc-stat-val mono">${journals.length}</span><span class="loc-stat-lbl">手账数</span></div>
      <div class="loc-stat"><span class="loc-stat-val mono">${photoCount}</span><span class="loc-stat-lbl">照片数</span></div>
      <div class="loc-stat"><span class="loc-stat-val mono">${loc.visitCount||0}</span><span class="loc-stat-lbl">到访次数</span></div>
    </div>
    <div class="journal-list">
      <div class="section-label">手账记录</div>
      ${journals.length?journals.map((j,i)=>{
        const cls=['ph-warm','ph-blue','ph-lavender','ph-green'][i%4];
        return `<div class="journal-item" onclick="openJournalDetail('${j.id}')">
          <div class="ji-thumb ${cls}"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20l5.5-9 4 6 3-4.5 5.5 7.5z"/><circle cx="17" cy="7" r="2.5"/></svg></div>
          <div class="ji-body"><span class="ji-title">${escapeHTML(j.title)}</span><span class="ji-excerpt">${escapeHTML(j.content||'暂无内容')}</span><span class="ji-date">${formatDate(j.createdAt)}</span></div>
        </div>`;
      }).join(''):`<div class="empty-state"><div class="empty-title">还没有手账记录</div><div class="empty-desc">点击右下角按钮，记录第一篇手账</div></div>`}
    </div>
    <div style="height:100px"></div>`;
  openSub('sub-location-detail');
}
function newJournalForLocation(){ openJournalEdit(null, currentLocId); }
async function locMore(){
  const loc=getLocation(currentLocId); if(!loc) return;
  const idx=await showSheet([{label:'删除地点'}]);
  if(idx===0){
    const ok=await showModal('删除地点', `确定要删除「${loc.name}」吗？相关手账将保留但不再关联此地点。`, {danger:true, confirmText:'删除'});
    if(ok){
      state.locations=state.locations.filter(l=>l.id!==currentLocId);
      state.journals.forEach(j=>{ if(j.locationId===currentLocId){ j.locationId=''; }});
      saveState();
      closeSub('sub-location-detail');
      if(currentTab===0) renderMap();
      showToast('已删除','✓');
    }
  }
}

/* ═══════════════════════════════════════════════════════════════
   搜索页
   ═══════════════════════════════════════════════════════════════ */
const SEARCH_FILTERS=[{key:'all',label:'全部'},{key:'location',label:'地点'},{key:'journal',label:'手账'},{key:'tag',label:'标签'}];
let searchFilter='all';
function renderSearchFilters(){
  const c=$('searchFilters'); c.innerHTML='';
  SEARCH_FILTERS.forEach(f=>{
    const b=el('div','filter-item'+(searchFilter===f.key?' active':''), f.label);
    b.onclick=()=>{ setSearchFilter(f.key); };
    c.appendChild(b);
  });
}
function setSearchFilter(key){ searchFilter=key; renderSearchFilters(); doSearch(); }
function onSearchInput(){ $('searchClear').style.display=$('searchInput').value?'flex':'none'; clearTimeout(searchTimer); searchTimer=setTimeout(doSearch,250); }
let searchTimer;
function clearSearch(){ $('searchInput').value=''; $('searchClear').style.display='none'; doSearch(); }
function doSearch(){
  const kw=$('searchInput').value.trim();
  const c=$('searchResults'); c.innerHTML='';
  let results=[];
  if(searchFilter==='location' && !kw){
    results=state.locations.map(l=>({type:'location', id:l.id, title:l.name, subtitle:l.address||(l.journalCount?l.journalCount+' 篇手账':'暂无手账'), date:l.lastVisitDate?formatDate(l.lastVisitDate):'', coverColor:l.coverColor}));
  } else if(kw){
    if(searchFilter==='journal'||searchFilter==='all'){
      searchJournals(kw).forEach(j=>results.push({type:'journal', id:j.id, title:j.title, subtitle:j.locationName, date:formatDate(j.createdAt), coverColor:MOOD_COLOR_CLASS[j.mood]||'warm'}));
    }
    if(searchFilter==='location'||searchFilter==='all'){
      searchLocations(kw).forEach(l=>results.push({type:'location', id:l.id, title:l.name, subtitle:l.address, date:l.lastVisitDate?formatDate(l.lastVisitDate):'', coverColor:l.coverColor}));
    }
    if(searchFilter==='tag'){
      const kwl=kw.toLowerCase();
      sortedJournals().filter(j=>j.tags&&j.tags.some(t=>String(t).toLowerCase().includes(kwl))).forEach(j=>results.push({type:'journal', id:j.id, title:j.title, subtitle:(j.tags||[]).slice(0,3).join(' · '), date:formatDate(j.createdAt), coverColor:MOOD_COLOR_CLASS[j.mood]||'warm'}));
    }
  }
  if(results.length){
    const count=el('div','search-count', (searchFilter==='location'&&!kw)?`共 ${results.length} 个地点`:`找到 ${results.length} 条结果`);
    c.appendChild(count);
    results.forEach(r=>{
      const card=el('div','list-card search');
      const icon = r.type==='journal'
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>';
      card.innerHTML=`
        <div class="lc-thumb ph-${r.coverColor||'warm'}">${icon}</div>
        <div class="lc-body">
          <span class="lc-title">${highlight(r.title, kw)}</span>
          <span class="lc-loc">${highlight(r.subtitle, kw)}</span>
          <span class="lc-date">${r.date}</span>
        </div>
        <span class="lc-type-badge ${r.type==='journal'?'badge-journal':'badge-location'}">${r.type==='journal'?'手账':'地点'}</span>`;
      card.onclick=()=>{ if(r.type==='journal') openJournalDetail(r.id); else { closeSub('sub-search'); openLocationDetail(r.id); } };
      c.appendChild(card);
    });
  } else {
    if(kw){
      c.appendChild(emptyState('没有找到结果','换个关键词试试吧'));
    } else {
      c.appendChild(emptyState('搜索手账和地点','输入关键词，寻找你的回忆'));
    }
  }
}
function highlight(text, kw){
  if(!text) return '';
  const str=String(text);
  if(!kw) return escapeHTML(str);
  const kwl=kw.toLowerCase(), lower=str.toLowerCase();
  let out='', i=0, idx=lower.indexOf(kwl);
  while(idx!==-1){
    if(idx>i) out+=escapeHTML(str.substring(i,idx));
    out+=`<span class="hl">${escapeHTML(str.substring(idx,idx+kw.length))}</span>`;
    i=idx+kw.length; idx=lower.indexOf(kwl,i);
  }
  if(i<str.length) out+=escapeHTML(str.substring(i));
  return out;
}

/* ═══════════════════════════════════════════════════════════════
   通用
   ═══════════════════════════════════════════════════════════════ */
function escapeHTML(s){ return String(s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* 时钟 */
function updateClock(){
  const d=new Date();
  $('clock').textContent=`${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

/* 窗口大小变化时重绘地图 */
window.addEventListener('resize', ()=>{ if(currentTab===0) drawMapCanvas(); renderMapMarkers(); });

/* 初始化 */
function init(){
  applyTheme();
  updateClock(); setInterval(updateClock, 30000);
  switchTab(0);
}
init();
</script>
